[Settings]
language = en
backend = awww
folder = ~/Documents/Wallpapers
monitors = All
wallpaper = ~/Documents/Wallpapers/Flowers.png
show_path_in_tooltip = True
fill = fill
sort = name
color = #000000
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = True
post_command = notify-send "Wallpaper set: $(basename $wallpaper)" & openrgb -p $(basename $wallpaper)
number_of_columns = 3
swww_transition_type = outer
swww_transition_step = 200
swww_transition_angle = 0
swww_transition_duration = 1
swww_transition_fps = 175
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = /home/brookolli/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini

